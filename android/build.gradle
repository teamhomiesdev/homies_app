buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        
        // Locked version of Media3 to ensure compatibility across your native packages
        media3Version = "1.4.1"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Force unified Media3 engine dependency trees down all subprojects/libraries
allprojects {
    configurations.all {
        resolutionStrategy {
            force "androidx.media3:media3-exoplayer:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-exoplayer-dash:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-exoplayer-hls:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-exoplayer-smoothstreaming:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-exoplayer-rtsp:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-datasource:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-datasource-okhttp:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-ui:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-session:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-common:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-extractor:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-database:${rootProject.ext.media3Version}"
            force "androidx.media3:media3-decoder:${rootProject.ext.media3Version}"
        }
    }
}